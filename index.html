<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Duel - Entrar na Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="login-container">
        <h1>Mini Duel</h1>
        
        <div class="decorative-icon">⚔️</div>
        
        <p style="color: #3d2b1f; font-weight: bold; margin-bottom: 20px;">
            Identifique-se, Nobre Duelista
        </p>

        <div class="form-group">
            <label for="username">Nome do Guerreiro</label>
            <input type="text" id="username" placeholder="Ex: Arthur Pendragon..." autofocus>
        </div>

        <button class="btn-entrar" onclick="fazerLogin()">
            Entrar na Arena
        </button>

        <footer>
            "O destino das cartas aguarda por você."
        </footer>
    </div>

    <script src="index.js"></script>

</body>
</html>
